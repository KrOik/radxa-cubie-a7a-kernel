name: Build Radxa Cubie Kernel

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      board:
        description: 'Board type to build'
        required: true
        default: 'both'
        type: choice
        options:
          - a7a
          - a7z
          - both

env:
  KERNEL_BRANCH: allwinner-aiot-linux-6.6
  BSP_BRANCH: cubie-aiot-v1.4.8
  BSP_WIFI_BRANCH: cubie-aiot-v1.4.6
  DEVICE_BRANCH: device-a733-v1.4.8

jobs:
  build-kernel:
    name: Build Kernel (${{ matrix.board }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        board: [a7a, a7z]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            bc device-tree-compiler cpio kmod \
            python3 swig flex bison \
            libssl-dev libncurses-dev libelf-dev \
            git wget curl xz-utils \
            parted dosfstools e2fsprogs \
            qemu-user-static binfmt-support

      - name: Show toolchain version
        run: |
          aarch64-linux-gnu-gcc --version
          make --version

      - name: Cache source repositories
        id: cache-sources
        uses: actions/cache@v4
        with:
          path: |
            kernel-6.6
            allwinner-bsp-1.4.8
            allwinner-bsp-1.4.6
            allwinner-device-1.4.8
          key: sources-${{ env.KERNEL_BRANCH }}-${{ env.BSP_BRANCH }}-${{ env.DEVICE_BRANCH }}
          restore-keys: |
            sources-${{ env.KERNEL_BRANCH }}-${{ env.BSP_BRANCH }}-
            sources-${{ env.KERNEL_BRANCH }}-

      - name: Clone upstream sources
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          # Clean up any partial clones from restore-keys
          rm -rf kernel-6.6 allwinner-bsp-1.4.8 allwinner-bsp-1.4.6 allwinner-device-1.4.8


          echo "Cloning kernel repository..."
          git clone --branch ${{ env.KERNEL_BRANCH }} --depth 1 \
            https://github.com/radxa/kernel.git kernel-6.6 || exit 1

          echo "Cloning BSP repository v1.4.8..."
          git clone --branch ${{ env.BSP_BRANCH }} --depth 1 \
            https://github.com/radxa/allwinner-bsp.git allwinner-bsp-1.4.8 || exit 1

          echo "Cloning BSP repository v1.4.6 (WiFi driver)..."
          git clone --branch ${{ env.BSP_WIFI_BRANCH }} --depth 1 \
            https://github.com/radxa/allwinner-bsp.git allwinner-bsp-1.4.6 || exit 1

          echo "Cloning device repository..."
          git clone --branch ${{ env.DEVICE_BRANCH }} --depth 1 \
            https://github.com/radxa/allwinner-device.git allwinner-device-1.4.8 || exit 1

          echo "All sources cloned successfully"

      - name: Apply patches
        run: |
          if [ -f scripts/apply-patches.sh ]; then
            chmod +x scripts/apply-patches.sh
            bash scripts/apply-patches.sh
          else
            echo "No patches script found, skipping..."
          fi

      - name: Setup kernel tree
        run: |
          chmod +x scripts/setup-kernel.sh
          bash scripts/setup-kernel.sh ${{ matrix.board }}

      - name: Configure kernel
        run: |
          cd kernel-6.6

          # Determine defconfig based on board
          if [ "${{ matrix.board }}" = "a7z" ] && [ -f arch/arm64/configs/cubie_a7z_defconfig ]; then
            DEFCONFIG="cubie_a7z_defconfig"
          else
            DEFCONFIG="cubie_a7a_defconfig"
          fi

          echo "Using defconfig: ${DEFCONFIG}"
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            BSP_TOP=bsp/ ${DEFCONFIG}

          # Show kernel version
          KERNEL_VERSION=$(make -s ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            BSP_TOP=bsp/ kernelrelease)
          echo "KERNEL_VERSION=${KERNEL_VERSION}" >> $GITHUB_ENV
          echo "Building kernel version: ${KERNEL_VERSION}"

      - name: Build kernel Image and DTBs
        run: |
          cd kernel-6.6
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            BSP_TOP=bsp/ -j$(nproc) Image dtbs

      - name: Build kernel modules
        run: |
          cd kernel-6.6
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            BSP_TOP=bsp/ -j$(nproc) modules

      - name: Install modules
        run: |
          cd kernel-6.6
          mkdir -p ../artifacts/${{ matrix.board }}/lib/modules
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            modules_install \
            INSTALL_MOD_PATH=../artifacts/${{ matrix.board }} \
            INSTALL_MOD_STRIP=1

          echo "Modules installed for kernel version: ${{ env.KERNEL_VERSION }}"

          # Clean up BSP ramfs and other unnecessary files from build symlink
          # These contain broken symlinks that break artifact upload
          if [ -d "../artifacts/${{ matrix.board }}/lib/modules/${{ env.KERNEL_VERSION }}/build/bsp/ramfs" ]; then
            echo "Removing BSP ramfs to avoid broken symlinks..."
            rm -rf "../artifacts/${{ matrix.board }}/lib/modules/${{ env.KERNEL_VERSION }}/build/bsp/ramfs"
          fi

      - name: Package build artifacts
        run: |
          mkdir -p artifacts/${{ matrix.board }}/boot

          # Copy kernel Image
          cp kernel-6.6/arch/arm64/boot/Image \
            artifacts/${{ matrix.board }}/boot/

          # Copy DTBs
          cp kernel-6.6/arch/arm64/boot/dts/allwinner/sun60i-a733-cubie-*.dtb \
            artifacts/${{ matrix.board }}/boot/ || true

          # Create version file
          echo "${{ env.KERNEL_VERSION }}" > \
            artifacts/${{ matrix.board }}/boot/kernel-version.txt

          # Create manifest
          cat > artifacts/${{ matrix.board }}/boot/build-info.txt <<EOF
          Board: ${{ matrix.board }}
          Kernel: ${{ env.KERNEL_VERSION }}
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Git Commit: ${{ github.sha }}
          Workflow: ${{ github.workflow }}
          EOF

          # Show artifact size
          du -sh artifacts/${{ matrix.board }}

      - name: Create release tarball
        run: |
          TARBALL_NAME="radxa-cubie-${{ matrix.board }}-kernel-${GITHUB_SHA:0:7}.tar.gz"

          cd artifacts/${{ matrix.board }}
          tar -czf ../../${TARBALL_NAME} *
          cd ../..

          sha256sum ${TARBALL_NAME} > ${TARBALL_NAME}.sha256
          echo "Created release tarball: ${TARBALL_NAME}"
          ls -lh ${TARBALL_NAME}*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.board }}-${{ github.sha }}
          path: artifacts/${{ matrix.board }}/
          retention-days: 30
          compression-level: 9

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball-${{ matrix.board }}
          path: |
            radxa-cubie-${{ matrix.board }}-kernel-*.tar.gz
            radxa-cubie-${{ matrix.board }}-kernel-*.tar.gz.sha256
          retention-days: 90

  build-image:
    name: Build Complete Image (A7Z only)
    # Skip kernel build - use cached artifact from successful run
    # needs: build-kernel
    runs-on: ubuntu-24.04
    # if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install image build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            parted gdisk util-linux \
            dosfstools e2fsprogs \
            xz-utils pixz \
            qemu-user-static binfmt-support \
            debootstrap wget curl

      - name: Download A7Z kernel artifacts (from previous successful build)
        run: |
          # Use known good kernel build: run 27186793540
          KERNEL_RUN_ID="27186793540"

          echo "Downloading kernel from successful run: $KERNEL_RUN_ID"
          gh run download "$KERNEL_RUN_ID" -n release-tarball-a7z -D ./
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download stock A7Z boot image
        run: |
          echo "Downloading stock Radxa A7Z image for U-Boot extraction..."
          # Download from our own release for reliable CI access
          gh release download v0.1-stock-boot -p "radxa-a733_bullseye_kde_r6.output_4096.img.xz"
          echo "✓ Stock image downloaded"
          ls -lh radxa-a733_bullseye_kde_r6.output_4096.img.xz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build UFS-compatible A7Z image (4096-byte sectors)
        run: |
          KERNEL_TARBALL=$(ls radxa-cubie-a7z-kernel-*.tar.gz | head -1)
          echo "Building UFS-compatible A7Z image with 4096-byte sectors..."
          echo ""
          echo "⚠️  IMPORTANT: UFS storage requires 4096-byte logical sectors!"
          echo "   Standard 512-byte sector images will NOT boot on UFS."
          echo ""
          echo "Process:"
          echo "  1. Create 4GB disk image with 4096-byte sectors"
          echo "  2. Create GPT partition table (4K-aligned)"
          echo "  3. Extract U-Boot from official image"
          echo "  4. Format boot and root partitions (4K blocks)"
          echo "  5. Install Debian 13 Trixie base system"
          echo "  6. Install custom kernel 6.6.98+ (A55 2800MHz, A76 3000MHz)"
          echo "  7. Configure system (users, SSH, networking)"
          echo ""

          # Build UFS-compatible image
          chmod +x scripts/create-ufs-image.sh
          sudo bash scripts/create-ufs-image.sh \
            radxa-cubie-a7z-ufs.img \
            "$KERNEL_TARBALL" \
            radxa-a733_bullseye_kde_r6.output_4096.img.xz \
            4

          echo ""
          echo "✅ UFS-Compatible A7Z Image Ready"
          echo "  - Sector size: 4096 bytes (UFS compatible)"
          echo "  - Debian 13 Trixie (minimal base)"
          echo "  - Custom overclocked kernel"
          echo "  - SSH enabled, DHCP networking"
          echo "  - Default users: root/debian, radxa/radxa"
          echo ""
          echo "⚠️  Flash with: sudo dd if=image.img of=/dev/sdX bs=4096 status=progress"

      - name: Compress image
        run: |
          echo "Compressing UFS image with xz (level 9)..."
          # xz will complain about setting file group but compression succeeds
          xz -9 -T0 -v radxa-cubie-a7z-ufs.img 2>&1 | grep -v "Cannot set the file group" || true

          # Verify compressed file exists
          if [ ! -f radxa-cubie-a7z-ufs.img.xz ]; then
            echo "ERROR: Compression failed - output file not found"
            exit 1
          fi

          # Calculate checksum
          sha256sum radxa-cubie-a7z-ufs.img.xz > radxa-cubie-a7z-ufs.img.xz.sha256

          echo "✓ UFS image compressed"
          ls -lh radxa-cubie-a7z-ufs.img.xz*

      - name: Upload UFS-compatible image
        uses: actions/upload-artifact@v4
        with:
          name: ufs-image-a7z
          path: |
            radxa-cubie-a7z-ufs.img.xz
            radxa-cubie-a7z-ufs.img.xz.sha256
          retention-days: 90
          compression-level: 0  # Already compressed

  build-summary:
    name: Build Summary
    needs: [build-kernel, build-image]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| A7A Kernel | ${{ needs.build-kernel.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| A7Z Kernel | ${{ needs.build-kernel.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| A7Z UFS Image (4096-byte sectors) | ${{ needs.build-image.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Kernel tarballs available for 90 days" >> $GITHUB_STEP_SUMMARY
          echo "- **UFS-compatible A7Z image** (.img.xz) with 4096-byte sectors" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Important Flash Instructions" >> $GITHUB_STEP_SUMMARY
          echo "UFS storage requires special handling:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# MUST use bs=4096 for UFS devices" >> $GITHUB_STEP_SUMMARY
          echo "sudo dd if=radxa-cubie-a7z-ufs.img of=/dev/sdX bs=4096 status=progress" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Standard 512-byte sector images will NOT boot on UFS storage." >> $GITHUB_STEP_SUMMARY
